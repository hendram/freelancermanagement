permissions:
  scopes:
    - read:jira-work

modules:
  jira:globalPage:
    - key: freelancermanagement-page
      resource: main
      resolver:
        function: resume
      title: freelancermanagement
  jira:issuePanel:
    - key: freelancerbidding-panel
      title: Freelancer Bidding
      resource: bidder-frontend
      icon: "issues"
      resolver:
        function: resume

  function:
    - key: resume
      handler: index.handler
    - key: runSchemaMigration
      handler: index.runSchemaMigration

  trigger:
    - key: post-install-schema-migration
      function: runSchemaMigration
      events:
        - avi:forge:installed:app

  sql:
    - key: main
      engine: mysql

resources:
  - key: main
    path: static/freelancemanagement/build
  - key: bidder-frontend
    path: static/freelancerbidding/build

app:
  runtime:
    name: nodejs22.x
    memoryMB: 256
    architecture: arm64
  id: ari:cloud:ecosystem::app/31af772d-638f-4d73-9366-1c590d4604bc

